<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DML VERESİYE9</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

h1{
color:#0f5f54;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#ff7a00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#e46b00;
}

</style>

</head>

<body>

<div class="login-box">

<h1>DML VERESİYE9</h1>

<input id="user" placeholder="Kullanıcı Kodu">

<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<p id="msg"></p>

</div>

<script>

async function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

let res=await fetch("https://YOURPROJECT.supabase.co/rest/v1/rpc/dml_login",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":"YOUR_ANON_KEY"
},
body:JSON.stringify({
p_user_code:user,
p_password:pass
})
})

let data=await res.json()

if(data.length>0){

document.getElementById("msg").innerText="Giriş başarılı"

}else{

document.getElementById("msg").innerText="Hatalı giriş"

}

}

</script>

</body>
</html>
