<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DML VERESİYE9</title>

<style>

body{
font-family:Arial;
background:#f5f6f7;
margin:0;
}

.header{
background:#0f5f54;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
width:250px;
display:inline-block;
margin:10px;
}

.btn{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.sale{
background:#ff7a00;
color:white;
}

.pay{
background:#0f5f54;
color:white;
}

</style>

</head>

<body>

<div class="header">
DML VERESİYE9
</div>

<div class="container">

<div class="card">
<h3>Ahmet Market</h3>
<p>Borç: 4250 ₺</p>
<button class="btn sale">Satış Yap</button>
<button class="btn pay">Tahsilat</button>
</div>

<div class="card">
<h3>Mehmet Büfe</h3>
<p>Borç: 980 ₺</p>
<button class="btn sale">Satış Yap</button>
<button class="btn pay">Tahsilat</button>
</div>

</div>

</body>
</html>
