<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DML VERESİYE9</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#edf1f3;
}

/* LOGO */

.brand-logo{
width:48px;
height:48px;
border-radius:10px;
object-fit:contain;
}

.header-logo{
width:44px;
height:44px;
border-radius:10px;
object-fit:contain;
}

/* LOGIN */

.app{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eef3f2;
}

.login-card{
width:400px;
background:white;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
overflow:hidden;
}

.top{
background:#0f5f54;
color:white;
padding:30px;
}

.brand-row{
display:flex;
align-items:center;
gap:12px;
}

.brand{
margin:0;
font-size:28px;
}

.sub{
margin-top:6px;
font-size:14px;
opacity:0.9;
}

.content{
padding:25px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ccc;
}

button{
cursor:pointer;
border:none;
}

.login-btn{
width:100%;
background:#ff7a00;
color:white;
padding:14px;
border-radius:12px;
font-weight:bold;
font-size:16px;
}

.panel{
min-height:100vh;
}

/* HEADER */

.header{
background:#0f5f54;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.header-title{
font-size:26px;
font-weight:bold;
}

.logout{
background:white;
color:#0f5f54;
padding:8px 14px;
border-radius:10px;
font-weight:bold;
}

/* MAIN */

.main{
padding:25px;
}

/* CUSTOMER GRID */

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,240px);
gap:20px;
}

.customer-card{
background:white;
border-radius:20px;
padding:18px;
border:1px solid #e5e7eb;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.customer-name{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.customer-balance{
background:#f4f6f7;
padding:8px;
border-radius:10px;
font-weight:bold;
margin-bottom:10px;
}

.customer-mini{
font-size:13px;
color:#666;
}

.actions{
display:flex;
flex-direction:column;
gap:8px;
margin-top:14px;
}

.sale{
background:#ff7a00;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.pay{
background:#0f5f54;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.detail-btn{
background:#e7f3f1;
padding:8px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

/* WHATSAPP */

.whatsapp-btn{
background:#25D366;
color:white;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="loginScreen" class="app">

<div class="login-card">

<div class="top">

<div class="brand-row">

<img class="brand-logo"
src="https://drive.google.com/uc?export=view&id=1cTOtzqSu7j1rDx5r_K7zt4RTLRjpielL">

<div>

<h1 class="brand">DML VERESİYE9</h1>
<p class="sub">Lisanslı veresiye takip sistemi</p>

</div>

</div>

</div>

<div class="content">

<label>Kullanıcı</label>
<input id="user">

<label>Şifre</label>
<input id="pass" type="password">

<button class="login-btn" onclick="login()">Giriş Yap</button>

</div>

</div>

</div>

<div id="panelScreen" class="panel hidden">

<div class="header">

<div class="header-left">

<img class="header-logo"
src="https://drive.google.com/uc?export=view&id=1cTOtzqSu7j1rDx5r_K7zt4RTLRjpielL">

<div class="header-title">DML VERESİYE9</div>

</div>

<div>
Firma: <b id="companyName"></b>
</div>

<button class="logout" onclick="logout()">Çıkış</button>

</div>

<div class="main">

<div id="cards" class="cards"></div>

</div>

</div>

<script>

const LOGO="https://drive.google.com/uc?export=view&id=1cTOtzqSu7j1rDx5r_K7zt4RTLRjpielL";

</script>

</body>
</html>
